# Reverse proxy for the events stack on academyfirstaid.com (the primary domain).
#   events.academyfirstaid.com      -> coordinator web      (127.0.0.1:8892)
#   events-api.academyfirstaid.com  -> backend API+realtime (127.0.0.1:8891)
#   sos.academyfirstaid.com         -> Runner Companion PWA (127.0.0.1:8894)
#   race.academyfirstaid.com        -> same PWA (interchangeable with sos)
#
# Place at /etc/nginx/sites-available/academyfirstaid.conf, symlink into
# sites-enabled, then run certbot (see infra/nginx/README.md) — certbot rewrites
# this file in place to add the 443 server blocks + the 80->443 redirects.
# The legacy *.hackohackob.com vhosts are kept as working aliases.

server {
    listen 80;
    listen [::]:80;
    server_name events.academyfirstaid.com;
    location / {
        proxy_pass http://127.0.0.1:8892;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    client_max_body_size 10M;
}

server {
    listen 80;
    listen [::]:80;
    server_name events-api.academyfirstaid.com;
    location / {
        proxy_pass http://127.0.0.1:8891;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    client_max_body_size 50M;
}

# sos + race are interchangeable — both serve the PWA on the same origin.
server {
    listen 80;
    listen [::]:80;
    server_name sos.academyfirstaid.com race.academyfirstaid.com;
    location / {
        proxy_pass http://127.0.0.1:8894;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
