# Reverse proxy for the Runner Companion PWA.
# Place at /etc/nginx/sites-available/pwa.hackohackob.com.conf and symlink into
# sites-enabled, then run certbot (see infra/nginx/README.md). Certbot rewrites
# this file to add the TLS server block + the port-80 → 443 redirect.

server {
    listen 80;
    listen [::]:80;
    server_name pwa.hackohackob.com;

    location / {
        proxy_pass http://127.0.0.1:8894;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
