services:
  api:
    image: hackohackob1/events-api:latest
    restart: unless-stopped
    ports:
      - "8891:8500"
    environment:
      PORT: 8500
      DATABASE_URL: "postgresql://events:${POSTGRES_PASSWORD:-events}@postgres:5432/events"
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: production
      GRAPHHOPPER_URL: "http://graphhopper:8989"
      GRAPHHOPPER_NATIVE_RESCUE: "true"
      # Speech-to-text for voice notes (Bulgarian-tuned). Keys live in the host
      # .env (/opt/events/.env), never in the repo. Soniox is primary, OpenAI is
      # the fallback; absent keys → transcripts are simply skipped.
      SONIOX_API_KEY: "${SONIOX_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Started, not healthy: the first-boot graph build can take minutes and the
      # API must come up regardless (routing just 503s until GraphHopper is ready).
      graphhopper:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8500/api/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - events_data:/app/apps/backend/data
      - events_uploads:/app/apps/backend/uploads

  web:
    image: hackohackob1/events-web:latest
    restart: unless-stopped
    ports:
      - "8892:8503"
    environment:
      NODE_ENV: production
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8503"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  simulator:
    image: hackohackob1/events-simulator:latest
    restart: unless-stopped
    ports:
      - "8893:8504"
    depends_on:
      - api
    healthcheck:
      # 127.0.0.1, not localhost: busybox wget prefers ::1 but nginx in the
      # image only listens on IPv4, so "localhost" reports unhealthy forever.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8504"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Runner Companion PWA (static, served by nginx). Reverse-proxied at
  # pwa.hackohackob.com → 127.0.0.1:8894. Calls the API cross-origin.
  runner:
    image: hackohackob1/events-runner:latest
    restart: unless-stopped
    ports:
      - "8894:8506"
    depends_on:
      - api
    healthcheck:
      # 127.0.0.1, not localhost — same IPv6 pitfall as the simulator above.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8506"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Self-hosted offline OSM routing for the navigation feature. Config comes from
  # the repo (deploy copies apps/backend/graphhopper/config.yml -> ./graphhopper/
  # config.yml); the OSM extract + built graph cache live in ./graphhopper/data
  # on the host (the extract is downloaded once by the deploy script). First boot
  # imports the graph (minutes); later boots reuse data/graph-cache.
  graphhopper:
    image: israelhikingmap/graphhopper:latest
    restart: unless-stopped
    command:
      - "-i"
      - "/gh/data/region-latest.osm.pbf"
      - "-c"
      - "/gh/config.yml"
      - "-o"
      - "/gh/data/graph-cache"
      - "--host"
      - "0.0.0.0"
    environment:
      JAVA_OPTS: "-Xmx4g -Xms1g"
    volumes:
      - ./graphhopper:/gh
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8989/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      # First boot builds the graph (minutes); don't flap unhealthy meanwhile.
      start_period: 900s

  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: events
      POSTGRES_USER: events
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-events}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events -d events"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  events_data:
  events_uploads:
