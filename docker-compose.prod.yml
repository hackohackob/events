services:
  api:
    image: hackohackob1/events-api:latest
    restart: unless-stopped
    ports:
      - "8891:8500"
    environment:
      PORT: 8500
      DATABASE_URL: "postgresql://events:${POSTGRES_PASSWORD:-events}@postgres:5432/events"
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8500/api/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - events_data:/app/apps/backend/data
      - events_uploads:/app/apps/backend/uploads

  web:
    image: hackohackob1/events-web:latest
    restart: unless-stopped
    ports:
      - "8892:8503"
    environment:
      NODE_ENV: production
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8503"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: events
      POSTGRES_USER: events
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-events}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events -d events"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  events_data:
  events_uploads:
