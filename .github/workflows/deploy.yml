name: Build and Deploy

on:
  push:
    branches:
      - master

env:
  API_IMAGE: hackohackob1/events-api
  WEB_IMAGE: hackohackob1/events-web
  SIM_IMAGE: hackohackob1/events-simulator
  DEPLOY_HOST: hackohackob.com
  DEPLOY_USER: hacko
  DEPLOY_DIR: /opt/events

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: hackohackob1
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.API_IMAGE }}:buildcache,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.WEB_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://events-api.hackohackob.com/api
            NEXT_PUBLIC_WS_URL=https://events-api.hackohackob.com/realtime
            NEXT_PUBLIC_MAPY_API_KEY=${{ secrets.MAPY_API_KEY }}
            NEXT_PUBLIC_USE_MAPY_TILES=true
          cache-from: type=registry,ref=${{ env.WEB_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.WEB_IMAGE }}:buildcache,mode=max

      - name: Build and push simulator image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/simulator/Dockerfile
          push: true
          tags: ${{ env.SIM_IMAGE }}:latest
          build-args: |
            VITE_API_URL=https://events-api.hackohackob.com
            VITE_EVENT_ID=severozapad
          cache-from: type=registry,ref=${{ env.SIM_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.SIM_IMAGE }}:buildcache,mode=max

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: "docker-compose.prod.yml,apps/backend/graphhopper/config.yml"
          target: ${{ env.DEPLOY_DIR }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd ${{ env.DEPLOY_DIR }}
            cp docker-compose.prod.yml docker-compose.yml
            mkdir -p data uploads

            # GraphHopper routing: config ships from the repo; the OSM extract is
            # downloaded once (159 MB) and the graph cache persists across deploys.
            mkdir -p graphhopper/data
            cp apps/backend/graphhopper/config.yml graphhopper/config.yml
            if [ ! -f graphhopper/data/region-latest.osm.pbf ]; then
              echo "Downloading OSM extract for routing (one-time)..."
              curl -fL -o graphhopper/data/region-latest.osm.pbf \
                https://download.geofabrik.de/europe/bulgaria-latest.osm.pbf
            fi

            # Free disk space before pulling new images
            docker system prune -f
            journalctl --vacuum-size=200M || true

            docker pull hackohackob1/events-api:latest
            docker pull hackohackob1/events-web:latest
            docker pull hackohackob1/events-simulator:latest

            docker-compose down
            docker-compose up -d

            sleep 15
            echo "=== Container Status ==="
            docker-compose ps

            # Clean up old images after successful deploy
            docker image prune -f
            echo "Deployment completed successfully"
