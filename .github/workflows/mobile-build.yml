name: Mobile build (local APK)

# Builds the Android APK with `eas build --local` — runs the full EAS build
# pipeline on the GitHub runner instead of Expo's servers, so it does NOT use
# any EAS cloud build credits. Free alternative to upgrading the Expo plan.
#
# Triggers:
#   • push a tag like `mobile-v1.2.3`  → builds + attaches the APK to a Release
#   • manual run (Actions ▸ Run workflow) → builds + uploads the APK as an artifact
#
# Required repo secret:
#   EXPO_TOKEN — a personal access token from https://expo.dev (Account settings ▸
#   Access tokens). Lets eas authenticate non-interactively and fetch the remote
#   Android keystore so the APK is signed with the same credentials as cloud builds.

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'eas.json build profile'
        required: true
        default: 'production-apk'

permissions:
  contents: write # needed to create the Release on tag builds

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PROFILE: ${{ github.event.inputs.profile || 'production-apk' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Verify EXPO_TOKEN is set
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN repo secret is not set. Create one at https://expo.dev (Account ▸ Access tokens) and add it under Settings ▸ Secrets ▸ Actions."
            exit 1
          fi
          eas whoami

      - name: Build Android APK (local, no EAS credits)
        working-directory: apps/mobile
        run: |
          eas build \
            --platform android \
            --profile "$EAS_PROFILE" \
            --local \
            --non-interactive \
            --output "$GITHUB_WORKSPACE/paramedic-event-${EAS_PROFILE}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: paramedic-event-apk
          path: ${{ github.workspace }}/paramedic-event-*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Attach APK to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/paramedic-event-*.apk
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
